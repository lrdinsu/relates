# 1) HTTP (port 80): allow cert challenges + redirect everything else to HTTPS
server {
  listen 80;
  server_name relatesapp.com www.relatesapp.com;

  # Let’s Encrypt challenge files
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Everything else -> HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# 2) HTTPS (port 443): serve site + proxy API
server {
  listen 443 ssl;
  server_name relatesapp.com www.relatesapp.com;

  ssl_certificate /etc/letsencrypt/live/relatesapp.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/relatesapp.com/privkey.pem;

  # frontend
  location / {
    proxy_pass http://web:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # api
  location /api/v1/ {
    proxy_pass http://server:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}