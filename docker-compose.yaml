services:
  db:
    image: postgres:16
    env_file:
      - ./server/.prod.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [appnet]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: relates-server:prod
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - ./server/.prod.env
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: unless-stopped

  migrate:
    image: relates-server:prod
    env_file:
      - ./server/.prod.env
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: "no"
    working_dir: /app
    command: ["npx", "prisma", "migrate", "deploy"]

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:8002:80"
    depends_on:
      - server
    networks: [ appnet ]
    restart: unless-stopped

networks:
  appnet:

volumes:
  pg_data: